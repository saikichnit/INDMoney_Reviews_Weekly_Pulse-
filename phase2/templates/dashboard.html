<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INDMoney Review Pulse - Production Dashboard</title>
    <style>
        :root { --primary: #10b981; --dark: #0f172a; --light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); padding: 40px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .report-list { list-style: none; padding: 0; }
        .report-item { padding: 15px; border-bottom: 1px solid #e2e8f0; cursor: pointer; transition: background 0.2s; }
        .report-item:hover { background: #f1f5f9; }
        .tag { background: #ecfdf5; color: #065f46; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Voice of Customer Pulse <span style="color: var(--primary); font-size: 1rem;">Phase 2 Production</span></h1>
            <button class="btn" onclick="generateReport()">Trigger New Analysis</button>
        </div>

        <div class="grid">
            <div id="activeReport" class="card">
                <p>Select a report from the history or trigger a new one.</p>
            </div>
            <div class="card">
                <h3>Historical Pulses</h3>
                <div id="historyList">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchReports() {
            const res = await fetch('/api/reports');
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = data.map(r => `
                <div class="report-item" onclick="loadReport(${r.id})">
                    <strong>Report #${r.id}</strong><br>
                    <small>${new Date(r.created_at).toLocaleDateString()}</small>
                </div>
            `).join('');
        }

        async function loadReport(id) {
            const res = await fetch(`/api/reports/${id}`);
            const r = await res.json();
            const active = document.getElementById('activeReport');
            active.innerHTML = `
                <h2>Report #${r.id} Summary</h2>
                <p>${r.summary}</p>
                <h3>Themes</h3>
                <div>${r.themes.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                <h3>Action Items</h3>
                <ul>${r.action_items.map(a => `<li>${a}</li>`).join('')}</h3>
                <br>
                <button class="btn" style="background: #3b82f6" onclick="sendEmail(${r.id})">Send Email Draft</button>
            `;
        }

        async function generateReport() {
            alert("Triggering production pipeline...");
            const res = await fetch('/api/generate-report', { method: 'POST' });
            const data = await res.json();
            if (data.report_id) {
                alert("Generation successful!");
                fetchReports();
                loadReport(data.report_id);
            }
        }

        async function sendEmail(id) {
            const res = await fetch(`/api/send-email/${id}`, { method: 'POST' });
            const data = await res.json();
            alert(data.message);
        }

        fetchReports();
    </script>
</body>
</html>
