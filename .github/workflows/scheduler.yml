name: Weekly Review Pulse Scheduler

on:
  schedule:
    # Proactive Intelligence: Run every hour to keep the synthesis "Warm" for instant UI loads
  # Proactive Intelligence: Run every hour to keep the synthesis "Warm" for instant UI loads
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      max_reviews:
        description: 'Max reviews to process'
        default: '5000'
      weeks:
        description: 'Time window in weeks'
        default: '52'
permissions:
  contents: write

jobs:
  weekly-pulse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Intelligence Pulse
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Calculate days from weeks input
          WEEKS=${{ github.event.inputs.weeks || '4' }}
          DAYS=$((WEEKS * 7))
          python phase4/generate_bridge.py \
            --days $DAYS \
            --max_reviews ${{ github.event.inputs.max_reviews || 1000 }}

      - name: Stop Services
        run: |
          lsof -ti:8001 | xargs kill -9 || true

      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git fetch origin main
          git checkout main
          git add data/*.json
          git commit -m "Auto-Pulse: Intelligence Sync [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main --force
