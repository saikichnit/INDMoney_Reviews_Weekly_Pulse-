name: Weekly Review Pulse Scheduler

on:
  schedule:
    # 3:35 PM IST is 10:05 AM UTC (IST = UTC + 5:30)
    - cron: '05 10 * * 1'
  workflow_dispatch:
    inputs:
      max_reviews:
        description: 'Max reviews to process'
        default: '1000'
      weeks:
        description: 'Time window in weeks'
        default: '8'

jobs:
  weekly-pulse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-with: '3.9'
          cache: 'pip'

      - name: Install Essential Dependencies
        run: |
          python -m pip install --upgrade pip
          # Only install core synthesis engines to save time
          pip install pandas requests python-dotenv fpdf2 google-generativeai groq app-store-scraper google-play-scraper

      - name: Generate Intelligence Pulse
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python phase4/generate_bridge.py \
            --days ${{ github.event.inputs.weeks || 8 }} \
            --max_reviews ${{ github.event.inputs.max_reviews || 1000 }}

      - name: Stop Services
        run: |
          lsof -ti:8001 | xargs kill -9 || true

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/latest_pulse.json data/reports_archive.json data/pulse_production.db
          git commit -m "Auto-Pulse: Intelligence Sync [skip ci]" || echo "No changes to commit"
          git push
